services:
  postgres:
    image: postgres:16-alpine
    container_name: phcustomerapi-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: phcustomerapi
    ports:
      - "5432:5432"
    volumes:
      - phcustomerapi-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d phcustomerapi"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  phcustomerapi-pgdata:
